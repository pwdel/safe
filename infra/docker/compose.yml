services:
  coding:
    image: "${SAFE_RUNNER_IMAGE:-safe-coding-runner:local}"
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "${SAFE_RUNNER_NETWORK_MODE:-bridge}"
    env_file:
      - /srv/safe-secrets/agent.env
    user: "10001:10001"
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /run
    pids_limit: 512
    volumes:
      - /srv/workspaces/forks:/workspace
      - /srv/safe-secrets:/home/agent/.keys/safe:ro
      - /srv/safe-state/codex:/home/agent/.codex
