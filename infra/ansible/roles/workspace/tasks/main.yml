- name: Ensure review user cannot write fork root
  file:
    path: "{{ fork_root }}"
    owner: "{{ admin_user }}"
    group: "{{ runner_host_group }}"
    mode: "2775"

- name: Sync configured task spec repo during provisioning
  command: /usr/local/bin/safe-sync-task-spec
  when: auto_sync_task_spec_repo | bool

- name: Build coding runner image during provisioning
  command: /usr/local/bin/safe-build-runner-image
  when: auto_build_runner_image | bool

- name: Start coding runner during provisioning
  command: /usr/local/bin/safe-start-runner
  when: auto_start_runner | bool

- name: Initialize runner auth during provisioning
  command: /usr/local/bin/safe-init-runner-auth
  changed_when: false
  when:
    - auto_init_runner_auth | bool
    - auto_start_runner | bool

- name: Apply task repo agent-assets in runner during provisioning
  command: /usr/local/bin/safe-apply-task-assets
  when:
    - auto_apply_task_assets | bool
    - auto_start_runner | bool

- name: Collect coding runner status after provisioning
  command: /usr/local/bin/safe-runner-status
  register: safe_runner_status_output
  changed_when: false
  when: auto_show_runner_status | bool

- name: Show coding runner status
  debug:
    var: safe_runner_status_output.stdout_lines
  when:
    - auto_show_runner_status | bool
    - safe_runner_status_output is defined
