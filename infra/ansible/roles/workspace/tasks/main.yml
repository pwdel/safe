---
- name: Create workspace root
  file:
    path: "{{ workspace_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Create fork workspace root
  file:
    path: "{{ fork_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ runner_host_group }}"
    mode: "2775"

- name: Create runtime secrets root
  file:
    path: "{{ secrets_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ runner_host_group }}"
    mode: "0750"

- name: Create runner state root
  file:
    path: "{{ runner_state_root }}"
    state: directory
    owner: root
    group: "{{ runner_host_group }}"
    mode: "0770"

- name: Create Codex state directory
  file:
    path: "{{ runner_codex_state_dir }}"
    state: directory
    owner: root
    group: "{{ runner_host_group }}"
    mode: "2770"

- name: Ensure admin key directory exists
  file:
    path: "/home/{{ admin_user }}/.keys/safe"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0700"

- name: Check if admin key env file exists
  stat:
    path: "/home/{{ admin_user }}/.keys/safe/agent.env"
  register: admin_agent_env_file

- name: Check if runtime agent env file exists
  stat:
    path: "{{ secrets_root }}/agent.env"
  register: runtime_agent_env_file

- name: Sync admin key env file into runtime secrets when non-empty
  copy:
    src: "/home/{{ admin_user }}/.keys/safe/agent.env"
    dest: "{{ secrets_root }}/agent.env"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ runner_host_group }}"
    mode: "0640"
  when:
    - admin_agent_env_file.stat.exists
    - (admin_agent_env_file.stat.size | int) > 0
    - (not runtime_agent_env_file.stat.exists) or ((runtime_agent_env_file.stat.size | default(0) | int) == 0)

- name: Ensure runtime agent env file exists
  file:
    path: "{{ secrets_root }}/agent.env"
    state: touch
    owner: "{{ admin_user }}"
    group: "{{ runner_host_group }}"
    mode: "0640"

- name: Mirror runtime env file into admin key directory
  copy:
    src: "{{ secrets_root }}/agent.env"
    dest: "/home/{{ admin_user }}/.keys/safe/agent.env"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"

- name: Check if admin task spec env file exists
  stat:
    path: "/home/{{ admin_user }}/.keys/safe/task-spec.env"
  register: admin_task_spec_env_file

- name: Check if runtime task spec env file exists
  stat:
    path: "{{ secrets_root }}/task-spec.env"
  register: runtime_task_spec_env_file

- name: Sync admin task spec env file into runtime secrets when non-empty
  copy:
    src: "/home/{{ admin_user }}/.keys/safe/task-spec.env"
    dest: "{{ secrets_root }}/task-spec.env"
    remote_src: true
    owner: root
    group: root
    mode: "0640"
  when:
    - admin_task_spec_env_file.stat.exists
    - (admin_task_spec_env_file.stat.size | int) > 0
    - (not runtime_task_spec_env_file.stat.exists) or ((runtime_task_spec_env_file.stat.size | default(0) | int) == 0)

- name: Ensure runtime task spec env file exists
  file:
    path: "{{ secrets_root }}/task-spec.env"
    state: touch
    owner: root
    group: root
    mode: "0640"

- name: Mirror runtime task spec env file into admin key directory
  copy:
    src: "{{ secrets_root }}/task-spec.env"
    dest: "/home/{{ admin_user }}/.keys/safe/task-spec.env"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"

- name: Create docker config directory
  file:
    path: "{{ workspace_root }}/docker"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Copy docker compose file
  copy:
    src: "{{ app_root }}/infra/docker/compose.yml"
    dest: "{{ workspace_root }}/docker/compose.yml"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Copy docker runner Dockerfile
  copy:
    src: "{{ app_root }}/infra/docker/coding-runner/Dockerfile"
    dest: "{{ workspace_root }}/docker/Dockerfile"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Copy docker runner init auth script
  copy:
    src: "{{ app_root }}/infra/docker/coding-runner/safe-init-auth.sh"
    dest: "{{ workspace_root }}/docker/safe-init-auth.sh"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Copy docker runner command guard script
  copy:
    src: "{{ app_root }}/infra/docker/coding-runner/safe-guard-command.sh"
    dest: "{{ workspace_root }}/docker/safe-guard-command.sh"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Copy docker runner OpenAPI contract check script
  copy:
    src: "{{ app_root }}/infra/docker/coding-runner/safe-openapi-contract-check.sh"
    dest: "{{ workspace_root }}/docker/safe-openapi-contract-check.sh"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Copy docker runner shell profile
  copy:
    src: "{{ app_root }}/infra/docker/coding-runner/safe-shellrc"
    dest: "{{ workspace_root }}/docker/safe-shellrc"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Seed readonly Codex config file when missing
  copy:
    src: "{{ app_root }}/infra/docker/coding-runner/codex.config.toml"
    dest: "{{ secrets_root }}/codex.config.toml"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
    force: false

- name: Create helper to prepare coding runner image
  copy:
    dest: /usr/local/bin/safe-prepare-runner-image
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker

      retries="${SAFE_RUNNER_RETRIES:-3}"
      delay_seconds="${SAFE_RUNNER_RETRY_DELAY_SECONDS:-5}"
      docker_wait_seconds="${SAFE_RUNNER_DOCKER_WAIT_SECONDS:-60}"
      runner_image="${SAFE_RUNNER_IMAGE:-safe-coding-runner:local}"
      pull_mode="${SAFE_RUNNER_PULL:-auto}"
      pull_required="${SAFE_RUNNER_PULL_REQUIRED:-0}"
      build_image="${SAFE_RUNNER_BUILD:-1}"

      pull_image=0
      case "$pull_mode" in
        1|true|yes|on)
          pull_image=1
          ;;
        0|false|no|off)
          pull_image=0
          ;;
        auto)
          if [[ "$runner_image" != "safe-coding-runner:local" ]]; then
            pull_image=1
          fi
          ;;
        *)
          echo "Invalid SAFE_RUNNER_PULL value: $pull_mode" >&2
          exit 2
          ;;
      esac

      retry_cmd() {
        local attempt=1
        while true; do
          if "$@"; then
            return 0
          fi
          if (( attempt >= retries )); then
            return 1
          fi
          echo "Retrying (${attempt}/${retries}): $*" >&2
          sleep "$delay_seconds"
          attempt=$((attempt + 1))
        done
      }

      deadline=$((SECONDS + docker_wait_seconds))
      until docker info >/dev/null 2>&1; do
        if (( SECONDS >= deadline )); then
          echo "Docker daemon was not ready after ${docker_wait_seconds}s." >&2
          exit 1
        fi
        sleep 2
      done

      if [[ "$pull_image" == "1" ]]; then
        if ! retry_cmd docker compose pull coding; then
          if [[ "$pull_required" == "1" ]]; then
            echo "Runner image pull failed and is required by SAFE_RUNNER_PULL_REQUIRED=1." >&2
            exit 1
          fi
          echo "Runner image pull failed; continuing with local build context." >&2
        fi
      fi

      if [[ "$build_image" == "1" ]]; then
        retry_cmd docker compose build --pull coding
      elif [[ "$pull_image" == "0" ]]; then
        if [[ -z "$(docker compose images -q coding 2>/dev/null)" ]]; then
          echo "Runner image is not available locally. Run safe-build-runner-image or safe-start-runner first." >&2
          exit 1
        fi
      fi

- name: Create helper to pull coding runner image
  copy:
    dest: /usr/local/bin/safe-pull-runner-image
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if [[ "${SAFE_RUNNER_IMAGE:-safe-coding-runner:local}" == "safe-coding-runner:local" ]]; then
        echo "safe-pull-runner-image needs a registry tag in SAFE_RUNNER_IMAGE." >&2
        exit 2
      fi
      exec env SAFE_RUNNER_BUILD=0 SAFE_RUNNER_PULL=1 SAFE_RUNNER_PULL_REQUIRED=1 /usr/local/bin/safe-prepare-runner-image

- name: Create helper to build coding runner image
  copy:
    dest: /usr/local/bin/safe-build-runner-image
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec env SAFE_RUNNER_BUILD=1 SAFE_RUNNER_PULL=0 /usr/local/bin/safe-prepare-runner-image

- name: Create operator helper script
  copy:
    dest: /usr/local/bin/safe-start-runner
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      /usr/local/bin/safe-prepare-runner-image
      exec docker compose up -d --no-build coding

- name: Create helper to start the coding runner offline
  copy:
    dest: /usr/local/bin/safe-start-runner-offline
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      env SAFE_RUNNER_BUILD=0 SAFE_RUNNER_PULL=0 /usr/local/bin/safe-prepare-runner-image
      exec env SAFE_RUNNER_NETWORK_MODE=none docker compose up -d --no-build coding

- name: Create helper to stop the coding runner
  copy:
    dest: /usr/local/bin/safe-stop-runner
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      exec docker compose stop coding

- name: Create helper to remove the coding runner container
  copy:
    dest: /usr/local/bin/safe-remove-runner
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      exec docker compose rm -f -s coding

- name: Create helper to rebuild the coding runner from scratch
  copy:
    dest: /usr/local/bin/safe-rebuild-runner
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      docker compose stop coding || true
      docker compose rm -f -s coding || true
      /usr/local/bin/safe-prepare-runner-image
      exec docker compose up -d --force-recreate --no-build coding

- name: Create helper to inspect coding runner status
  copy:
    dest: /usr/local/bin/safe-runner-status
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      exec docker compose ps

- name: Create helper to prune VM/runtime disk usage
  copy:
    dest: /usr/local/bin/safe-prune-runtime
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      usage() {
        cat <<'EOF'
      Usage: safe-prune-runtime [--days N] [--dry-run] [--skip-docker-prune]

      Options:
        --days N               Retention window for logging artifacts in days (default: 14)
        --dry-run              Show planned removals without deleting files
        --skip-docker-prune    Skip docker system/builder prune
        -h, --help             Show this help
      EOF
      }

      if [[ "$(id -u)" == "0" ]]; then
        exec sudo -u {{ admin_user }} -H "$0" "$@"
      fi

      retention_days="${SAFE_PRUNE_RETENTION_DAYS:-14}"
      dry_run=0
      skip_docker_prune=0

      while [[ $# -gt 0 ]]; do
        case "$1" in
          --days)
            [[ $# -ge 2 ]] || { echo "--days requires a value" >&2; exit 2; }
            retention_days="$2"
            shift 2
            ;;
          --dry-run)
            dry_run=1
            shift
            ;;
          --skip-docker-prune)
            skip_docker_prune=1
            shift
            ;;
          -h|--help)
            usage
            exit 0
            ;;
          *)
            echo "Unknown option: $1" >&2
            usage >&2
            exit 2
            ;;
        esac
      done

      [[ "$retention_days" =~ ^[0-9]+$ ]] || { echo "Invalid --days value: $retention_days" >&2; exit 2; }

      env_file="/home/{{ admin_user }}/.keys/safe/task-spec.env"
      if [[ -f "$env_file" ]]; then
        while IFS= read -r line || [[ -n "$line" ]]; do
          if [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]]; then
            continue
          fi
          if [[ "$line" =~ ^([A-Za-z_][A-Za-z0-9_]*)=(.*)$ ]]; then
            key="${BASH_REMATCH[1]}"
            value="${BASH_REMATCH[2]}"
            export "$key=$value"
            continue
          fi
          echo "Invalid line in $env_file: $line" >&2
          exit 1
        done <"$env_file"
      fi

      workspace_docker="{{ workspace_root }}/docker"
      fork_root="{{ fork_root }}"
      logging_dir="${SAFE_TASK_LOGGING_DIR:-log-socialpredict-tasks}"
      logging_root="$fork_root/$logging_dir"
      runs_dir="$logging_root/.codex-runs"
      reports_dir="$logging_root/.codex-reports/tasks"

      run_cmd() {
        if (( dry_run == 1 )); then
          printf '[dry-run] %s\n' "$*"
        else
          "$@"
        fi
      }

      prune_old_subdirs() {
        local root="$1"
        if [[ ! -d "$root" ]]; then
          return 0
        fi
        while IFS= read -r -d '' dir; do
          if (( dry_run == 1 )); then
            echo "[dry-run] rm -rf $dir"
          else
            rm -rf "$dir"
          fi
        done < <(find "$root" -mindepth 1 -maxdepth 1 -type d -mtime +"$retention_days" -print0)
      }

      echo "Disk usage before cleanup:"
      df -h / "$fork_root" || true
      echo
      echo "Docker usage before cleanup:"
      docker system df || true

      if (( skip_docker_prune == 0 )); then
        run_cmd docker system prune -af
        run_cmd docker builder prune -af
      fi

      if [[ -f "$workspace_docker/compose.yml" ]]; then
        if docker compose -f "$workspace_docker/compose.yml" ps --status running --services 2>/dev/null | grep -qx "coding"; then
          if (( dry_run == 1 )); then
            echo "[dry-run] docker compose -f $workspace_docker/compose.yml exec -T coding rm runner caches"
          else
            docker compose -f "$workspace_docker/compose.yml" exec -T coding bash -lc '
              rm -rf /home/agent/.tmp/go-build/* \
                     /home/agent/.tmp/xdg-cache/* \
                     /home/agent/.tmp/npm-cache/*'
          fi
        fi
      fi

      prune_old_subdirs "$runs_dir"
      prune_old_subdirs "$reports_dir"

      for repo in "$fork_root"/*; do
        if [[ ! -d "$repo/.git" ]]; then
          continue
        fi
        if (( dry_run == 1 )); then
          echo "[dry-run] git -C $repo gc"
          echo "[dry-run] find $repo/.git -name gc.log -delete"
        else
          git -C "$repo" gc || true
          find "$repo/.git" -name gc.log -delete || true
        fi
      done

      echo
      echo "Disk usage after cleanup:"
      df -h / "$fork_root" || true
      echo
      echo "Docker usage after cleanup:"
      docker system df || true

- name: Create helper to open shell in coding container
  copy:
    dest: /usr/local/bin/safe-enter-runner
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      exec docker compose exec coding bash

- name: Create helper to run OpenAPI contract checks in coding container
  copy:
    dest: /usr/local/bin/safe-run-openapi-contract-check
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      exec docker compose exec coding safe-openapi-contract-check "$@"

- name: Create helper to initialize runner auth from mounted runtime env
  copy:
    dest: /usr/local/bin/safe-init-runner-auth
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
      exec docker compose exec -T coding safe-init-auth

- name: Create helper to run Codex web/device login in coding container
  copy:
    dest: /usr/local/bin/safe-codex-login
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ workspace_root }}/docker
