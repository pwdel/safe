---
- name: Update apt cache and upgrade packages
  apt:
    update_cache: true
    upgrade: dist

- name: Install base packages
  apt:
    name:
      - git
      - curl
      - ca-certificates
      - jq
      - ripgrep
      - python3
      - python3-venv
      - python3-pip
      - docker.io
      - docker-compose-v2
    state: present

- name: Ensure docker is enabled and started
  service:
    name: docker
    state: started
    enabled: true
