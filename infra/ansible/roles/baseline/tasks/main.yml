---
- name: Update apt cache and upgrade packages
  apt:
    update_cache: true
    upgrade: dist

- name: Install base packages
  apt:
    name:
      - git
      - curl
      - ca-certificates
      - jq
      - ripgrep
      - python3
      - python3-venv
      - python3-pip
      - docker.io
      - docker-compose-v2
      - ufw
    state: present

- name: Ensure docker is enabled and started
  service:
    name: docker
    state: started
    enabled: true

- name: Allow OpenSSH through firewall
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Set default incoming firewall policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing firewall policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable firewall
  community.general.ufw:
    state: enabled
